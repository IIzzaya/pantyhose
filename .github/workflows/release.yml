name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v -count=1 -timeout 120s ./...

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        run: |
          LDFLAGS="-s -w -X main.version=${{ steps.version.outputs.VERSION }}"

          # Server builds
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "$LDFLAGS" -o pantyhose-server-windows.exe ./cmd/pantyhose-server

          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "$LDFLAGS" -o pantyhose-server-mac-os-intel ./cmd/pantyhose-server

          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "$LDFLAGS" -o pantyhose-server-mac-os-apple-silicon ./cmd/pantyhose-server

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "$LDFLAGS" -o pantyhose-server-linux ./cmd/pantyhose-server

          # Client builds
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "$LDFLAGS" -o pantyhose-client-windows.exe ./cmd/pantyhose-client

          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "$LDFLAGS" -o pantyhose-client-mac-os-intel ./cmd/pantyhose-client

          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "$LDFLAGS" -o pantyhose-client-mac-os-apple-silicon ./cmd/pantyhose-client

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "$LDFLAGS" -o pantyhose-client-linux ./cmd/pantyhose-client

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            pantyhose-server-windows.exe \
            pantyhose-server-mac-os-intel \
            pantyhose-server-mac-os-apple-silicon \
            pantyhose-server-linux \
            pantyhose-client-windows.exe \
            pantyhose-client-mac-os-intel \
            pantyhose-client-mac-os-apple-silicon \
            pantyhose-client-linux
